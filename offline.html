<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لا يوجد اتصال</title>
<style>
  body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;background:#071b2e;color:#fff;font-family:Tajawal,Arial,sans-serif;text-align:center;padding:24px}
  .box{max-width:420px}
  h1{font-size:20px;margin-bottom:10px}
  p{color:#c9d4dd;line-height:1.8;font-size:14px}
  button{margin-top:18px;background:#c9a227;color:#071b2e;border:none;padding:12px 24px;border-radius:10px;font-weight:700;font-size:14px;cursor:pointer}
</style>
</head>
<body>
  <div class="box">
    <h1>⚠️ لا يوجد اتصال بالإنترنت</h1>
    <p>تعذر تحميل المنظومة لعدم توفر اتصال بالشبكة. من فضلك تحقق من اتصالك بالإنترنت ثم أعد المحاولة.</p>
    <button onclick="location.reload()">إعادة المحاولة</button>
  </div>
</body>
</html>
